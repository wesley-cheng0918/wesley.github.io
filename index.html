<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="PDF flipbook portfolio.">
    <title>PDF Portfolio</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main>
      <section class="reader-section" id="reader" aria-labelledby="reader-title">
        <div class="section-heading">
          <h1 id="reader-title">Flip through the featured portfolio PDF.</h1>
        </div>

        <div class="pdf-reader" data-pdf-reader>
          <div class="reader-toolbar" aria-label="PDF reader controls">
            <label class="button button-primary file-button">
              Change PDF
              <input id="pdf-file" type="file" accept="application/pdf">
            </label>
            <button class="button button-secondary" type="button" data-pdf-prev>Previous</button>
            <span class="page-status" data-pdf-status>Page 0 / 0</span>
            <button class="button button-secondary" type="button" data-pdf-next>Next</button>
            <button class="button button-secondary" type="button" data-pdf-download>Download</button>
            <button class="button button-secondary" type="button" data-pdf-fullscreen>Fullscreen</button>
            <button class="button button-secondary" type="button" data-pdf-zoom-out>Zoom out</button>
            <button class="button button-secondary" type="button" data-pdf-zoom-in>Zoom in</button>
          </div>

          <div class="pdf-book-wrap">
            <div class="pdf-book" id="pdf-book" aria-label="PDF page flip preview"></div>
            <p class="reader-empty" data-pdf-empty>Loading the portfolio PDF...</p>
          </div>
        </div>
      </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
